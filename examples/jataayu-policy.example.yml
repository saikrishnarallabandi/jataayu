# Jataayu Policy Configuration Example
# =====================================
# Place as jataayu-policy.yml in your project root, or point to it with:
#   JATAAYU_POLICY_FILE=/path/to/jataayu-policy.yml
#
# Usage in Python:
#   from jataayu.config.policy import load_policy
#   policy = load_policy("jataayu-policy.yml")
#   agent_policy = policy.get_agent_policy("my-agent")
#   config = agent_policy.to_privacy_config()  # for OutboundGuard
#   threshold = agent_policy.get_block_threshold("github-issue")

version: 1

# Global defaults — applied to all agents unless overridden per-agent
defaults:
  block_threshold: 0.90       # Block above this score (0.0-1.0)
  llm_threshold: 0.35         # Invoke LLM slow path above this score
  use_llm: false              # Default: fast path only (no LLM cost)
  check_credentials: true     # Scan outbound content for leaked credentials
  check_high_entropy: false   # Entropy-based secret detection (more FPs)

# Per-agent policies
agents:

  # A coding agent (Cline, Claude Code, Cursor, etc.)
  # These agents read GitHub issues, PRs, and web pages — high Clinejection risk
  coding-agent:
    allowed_surfaces:
      - github-issue          # Reads issues — mark as tainted
      - github-pr
      - github-comment
      - coding-task           # Running shell commands, writing files
      - internal
      - direct-message
    surface_overrides:
      github-issue:
        block_threshold: 0.70    # More aggressive blocking on GitHub inputs
        inbound_strict: true
        risk_multiplier: 1.2
      coding-task:
        block_threshold: 0.95    # More permissive for actual coding work
        inbound_strict: false    # Shell commands are expected
        risk_multiplier: 0.7
    protected_names: []
    check_credentials: true      # Catch leaked secrets in output
    check_high_entropy: false

  # A GitHub bot (reads issues, comments, sends responses)
  github-bot:
    allowed_surfaces:
      - github-issue
      - github-pr
      - github-comment
      - internal
    surface_overrides:
      github-issue:
        block_threshold: 0.65    # Strict — GitHub issues are public attack surface
        inbound_strict: true
        risk_multiplier: 1.3
        trust_level: low
      github-comment:
        block_threshold: 0.70
        inbound_strict: true
    protected_names: []
    check_credentials: true
    use_llm: false               # Speed matters for CI bots

  # A WhatsApp/messaging assistant that handles family context
  privacy-bot:
    allowed_surfaces:
      - group-chat
      - direct-message
      - internal
    surface_overrides:
      group-chat:
        outbound_strict: true    # Strict about what goes to group chats
        block_threshold: 0.65
    # List names that should NEVER appear in group chat responses
    protected_names:
      - Veda                     # Children's names
      - Tarak
      - "Your Child's Name"
    check_credentials: false     # WhatsApp bot doesn't handle code/secrets
    use_llm: true                # Privacy judgments benefit from LLM

  # An internal-only agent (loose restrictions)
  internal-agent:
    allowed_surfaces:
      - internal
      - direct-message
    surface_overrides:
      internal:
        block_threshold: 0.98   # Almost nothing blocked in internal context
        inbound_strict: false
    check_credentials: false

# Global surface profile overrides (apply to all agents)
# These override the built-in profiles in surfaces/profiles.py
surfaces:
  github-issue:
    trust_level: low
    inbound_strict: true
    risk_multiplier: 1.2
    description: "GitHub issue body — classic Clinejection attack surface"

  github-pr:
    trust_level: low
    inbound_strict: true
    risk_multiplier: 1.15

  github-comment:
    trust_level: low
    inbound_strict: true
    risk_multiplier: 1.1

  web-content:
    trust_level: low
    inbound_strict: true
    risk_multiplier: 1.1

  coding-task:
    trust_level: medium
    inbound_strict: false        # Coding tasks often contain shell commands
    risk_multiplier: 0.7

  internal:
    trust_level: high
    inbound_strict: false
    risk_multiplier: 0.4
